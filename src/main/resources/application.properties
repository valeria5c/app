# src/main/resources/application.properties

# ============================================================
# CONFIGURACIÓN DE MONGODB LOCAL
# ============================================================
spring.data.mongodb.uri=mongodb://localhost:27017/contaminacion_db
spring.data.mongodb.database=contaminacion_db

# ============================================================
# CONFIGURACIÓN DE VAADIN
# ============================================================
vaadin.url-mapping=/*
vaadin.launch-browser=true

# ============================================================
# LOGGING
# ============================================================
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.contaminacion=INFO
